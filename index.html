<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR Brille - Finale Steuerung</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script>
      AFRAME.registerComponent('ar-steuerung', {
        init: function () {
          const controller = this.el;
          const sceneEl = document.querySelector('a-scene');
          const scene = sceneEl.object3D;
          const target = document.querySelector('#parent-container');
          const camera = document.querySelector('a-camera');

          let isGrabbed = false;

          const deadzone = 0.2;
          const rotateStep = 0.03;
          const moveStep = 0.06;
          const minDistance = 0.25;
          const maxDistance = 4.0;

          const camWorld = new THREE.Vector3();
          const objWorld = new THREE.Vector3();
          const dirWorld = new THREE.Vector3();
          const newWorld = new THREE.Vector3();

          // GREIFEN
          controller.addEventListener('triggerdown', () => {
            const raycaster = controller.components.raycaster;
            const hits = raycaster ? raycaster.intersections : [];

            if (hits.length > 0) {
              isGrabbed = true;
              controller.object3D.attach(target.object3D);
            }
          });

          // LOSLASSEN
          controller.addEventListener('triggerup', () => {
            if (isGrabbed) {
              isGrabbed = false;
              scene.attach(target.object3D);
            }
          });

          // JOYSTICK
          controller.addEventListener('thumbstickmoved', (evt) => {
            if (isGrabbed) return;

            const x = evt.detail.x || 0;
            const y = evt.detail.y || 0;

            // DREHEN
            if (x > deadzone) target.object3D.rotation.y += rotateStep;
            if (x < -deadzone) target.object3D.rotation.y -= rotateStep;

            // ZOOM / DISTANZ
            if (Math.abs(y) > deadzone) {
              // Weltpositionen holen
              camera.object3D.getWorldPosition(camWorld);
              target.object3D.getWorldPosition(objWorld);

              // Richtung von Kamera -> Objekt
              dirWorld.subVectors(objWorld, camWorld);
              let distance = dirWorld.length();

              if (distance < 0.0001) return;

              dirWorld.normalize();

              // Stick zu dir ziehen = näher
              if (y > deadzone) {
                distance = Math.max(minDistance, distance - moveStep);
              }

              // Stick nach vorne = weiter weg
              if (y < -deadzone) {
                distance = Math.min(maxDistance, distance + moveStep);
              }

              // Neue Weltposition entlang der Blicklinie
              newWorld.copy(camWorld).add(dirWorld.multiplyScalar(distance));

              // Da target direkt an der Scene hängt, können wir Welt = Lokal setzen
              target.object3D.position.copy(newWorld);
            }
          });
        }
      });
    </script>
  </head>

  <body>
    <a-scene xr-mode-ui="XRMode: ar" renderer="colorManagement: true">
      <a-assets>
        <a-asset-item id="meinModell" src="EntwurfARBrille.glb"></a-asset-item>
      </a-assets>

      <a-entity id="parent-container" position="0 1.2 -1">
        <a-entity
          id="modell-objekt"
          gltf-model="#meinModell"
          class="clickable"
          scale="1 1 1">
        </a-entity>
      </a-entity>

      <a-entity id="hand"
                oculus-touch-controls="hand: right"
                raycaster="objects: .clickable; showLine: true; far: 100"
                line="color: yellow; opacity: 1"
                ar-steuerung>
      </a-entity>

      <a-light type="ambient" intensity="1.5"></a-light>
      <a-light type="directional" position="1 2 1" intensity="1"></a-light>
      <a-camera position="0 1.6 0"></a-camera>
    </a-scene>
  </body>
</html>
