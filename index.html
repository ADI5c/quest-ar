<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>POPP AR Viewer v6</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script>

// ═══════════════════════════════════════════════════════════════════
// TOPSOLID 7.19  |  Einheit: METER  |  Scale: 1.0
// Koordinaten-Offset (X≈43) wird automatisch herausgerechnet
// ═══════════════════════════════════════════════════════════════════

window.POPP = {
  clipEnabled:   false,
  clipAxis:      'x',
  clipPos:       0.0,
  clipFlip:      false,
  placementMode: 'float',
  modelSize:     new THREE.Vector3(1,1,1),
  modelReady:    false,
  menuOpen:      true,
};

function applyClip() {
  const modelEl = document.querySelector('#modell-objekt');
  if (!modelEl?.object3D) return;
  const renderer = document.querySelector('a-scene')?.renderer;
  if (renderer) renderer.localClippingEnabled = true;
  const p = window.POPP;
  modelEl.object3D.traverse(obj => {
    if (!obj.isMesh || !obj.material) return;
    const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
    mats.forEach(mat => {
      if (p.clipEnabled) {
        const n = p.clipAxis==='x' ? new THREE.Vector3(1,0,0)
                : p.clipAxis==='y' ? new THREE.Vector3(0,1,0)
                                   : new THREE.Vector3(0,0,1);
        if (p.clipFlip) n.negate();
        mat.clippingPlanes = [new THREE.Plane(n, -p.clipPos)];
        mat.clipShadows = true;
      } else {
        mat.clippingPlanes = [];
      }
      mat.needsUpdate = true;
    });
  });
}

function applyPlacement() {
  if (!window.POPP.modelReady) return;
  const rig = document.querySelector('#rig');
  if (!rig) return;
  if (window.POPP.placementMode === 'floor') {
    const h = window.POPP.modelSize.y * 0.5;
    rig.setAttribute('position', `0 ${h.toFixed(3)} -1.2`);
  } else {
    rig.setAttribute('position', '0 1.2 -0.8');
  }
}

// ── AUTO-CENTER + SCALE ──────────────────────────────────────────
AFRAME.registerComponent('auto-center-scale', {
  init: function() {
    this.el.addEventListener('model-loaded', e => {
      const model = e.detail.model;
      if (!model) return;
      model.scale.setScalar(1.0);
      const box = new THREE.Box3().setFromObject(model);
      const size = new THREE.Vector3(), center = new THREE.Vector3();
      box.getSize(size); box.getCenter(center);
      model.position.sub(center);
      window.POPP.modelSize.copy(size);
      window.POPP._clipHalf = size.x * 0.5;
      window.POPP.modelReady = true;
      const gb = document.querySelector('#grab-box');
      if (gb) {
        gb.setAttribute('width',  size.x.toFixed(4));
        gb.setAttribute('height', size.y.toFixed(4));
        gb.setAttribute('depth',  size.z.toFixed(4));
      }
      applyPlacement();
      applyClip();
      setMenuText('info-text', `${(size.x*1000)|0} x ${(size.y*1000)|0} x ${(size.z*1000)|0} mm`);
    });
  }
});

// ── HEAD-LOCKED ──────────────────────────────────────────────────
AFRAME.registerComponent('head-locked', {
  schema: {
    dist:    { type:'number', default: 1.0 },
    offsetX: { type:'number', default: 0.30 },
    offsetY: { type:'number', default: -0.20 },
  },
  init: function() {
    this.smooth = new THREE.Vector3();
    this.ready  = false;
    this.camDir = new THREE.Vector3();
    this.camPos = new THREE.Vector3();
    this.right  = new THREE.Vector3();
    this.up     = new THREE.Vector3(0,1,0);
    this.target = new THREE.Vector3();
  },
  tick: function() {
    const cam = document.querySelector('a-camera')?.object3D;
    if (!cam) return;
    cam.getWorldPosition(this.camPos);
    cam.getWorldDirection(this.camDir);
    this.right.crossVectors(this.camDir, this.up).normalize();
    this.target.copy(this.camPos)
      .addScaledVector(this.camDir, this.data.dist)
      .addScaledVector(this.right,  this.data.offsetX)
      .addScaledVector(this.up,     this.data.offsetY);
    if (!this.ready) { this.smooth.copy(this.target); this.ready = true; }
    this.smooth.lerp(this.target, 0.07);
    this.el.object3D.position.copy(this.smooth);
    this.el.object3D.lookAt(this.camPos);
  }
});

// ── MENU-BUTTON ──────────────────────────────────────────────────
AFRAME.registerComponent('menu-button', {
  schema: { action: { type:'string', default:'' } },
  init: function() {
    this.el.classList.add('menu-btn');
    this.bg = this.el.querySelector('.btn-bg');
    this.defaultColor = this.bg ? this.bg.getAttribute('color') : '#1a1a3a';

    this.el.addEventListener('mouseenter', () => {
      if (this.bg) this.bg.setAttribute('color', '#2255aa');
    });
    this.el.addEventListener('mouseleave', () => {
      if (this.bg) this.bg.setAttribute('color', this.activeColor || this.defaultColor);
    });
    this.el.addEventListener('click', () => {
      handleAction(this.data.action);
    });
  },
  setActive: function(color) {
    this.activeColor = color;
    if (this.bg) this.bg.setAttribute('color', color);
  },
  setInactive: function() {
    this.activeColor = null;
    if (this.bg) this.bg.setAttribute('color', this.defaultColor);
  }
});

function setMenuText(id, val) {
  const el = document.getElementById(id);
  if (el) el.setAttribute('value', val);
}

function handleAction(action) {
  switch(action) {
    case 'toggleMenu': {
      window.POPP.menuOpen = !window.POPP.menuOpen;
      document.getElementById('main-panel').setAttribute('visible', window.POPP.menuOpen);
      setMenuText('hamburger-text', window.POPP.menuOpen ? 'X' : '=');
      break;
    }
    case 'togglePlacement': {
      window.POPP.placementMode = window.POPP.placementMode === 'float' ? 'floor' : 'float';
      applyPlacement();
      const isFloor = window.POPP.placementMode === 'floor';
      setMenuText('place-text', isFloor ? 'Schwebend' : 'Boden 1:1');
      const comp = document.getElementById('btn-place')?.components['menu-button'];
      if (comp) isFloor ? comp.setActive('#003322') : comp.setInactive();
      break;
    }
    case 'toggleClip': {
      window.POPP.clipEnabled = !window.POPP.clipEnabled;
      applyClip();
      const on = window.POPP.clipEnabled;
      setMenuText('clip-text', on ? 'Clip AUS' : 'Clip AN');
      const comp = document.getElementById('btn-clip')?.components['menu-button'];
      if (comp) on ? comp.setActive('#003322') : comp.setInactive();
      document.getElementById('clip-sub').setAttribute('visible', on);
      break;
    }
    case 'axisX': setClipAxis('x'); break;
    case 'axisY': setClipAxis('y'); break;
    case 'axisZ': setClipAxis('z'); break;
    case 'sliderPlus':  moveSlider( 1); break;
    case 'sliderMinus': moveSlider(-1); break;
    case 'flipClip': {
      window.POPP.clipFlip = !window.POPP.clipFlip;
      if (window.POPP.clipEnabled) applyClip();
      break;
    }
  }
}

function setClipAxis(axis) {
  window.POPP.clipAxis = axis;
  const s = window.POPP.modelSize;
  window.POPP._clipHalf = (axis==='x'?s.x : axis==='y'?s.y : s.z) * 0.5;
  window.POPP.clipPos = 0;
  if (window.POPP.clipEnabled) applyClip();
  setMenuText('slider-val', '0 mm');
  ['x','y','z'].forEach(a => {
    const comp = document.getElementById('btn-axis-'+a)?.components['menu-button'];
    if (comp) a===axis ? comp.setActive('#003366') : comp.setInactive();
  });
}

function moveSlider(dir) {
  const half = window.POPP._clipHalf || window.POPP.modelSize.x * 0.5;
  const step = Math.max(0.001, half / 50);
  window.POPP.clipPos = Math.max(-half, Math.min(half, window.POPP.clipPos + dir * step));
  if (window.POPP.clipEnabled) applyClip();
  setMenuText('slider-val', (window.POPP.clipPos*1000).toFixed(0)+' mm');
}

// ── AR-STEUERUNG ─────────────────────────────────────────────────
AFRAME.registerComponent('ar-steuerung', {
  init: function() {
    this.rig       = document.querySelector('#rig').object3D;
    this.modelNode = document.querySelector('#model-node').object3D;
    this.grabBoxEl = document.querySelector('#grab-box');
    this.isGrabbed=false; this.activeSource=null; this.handNearObject=false;
    this.stickX=0; this.stickY=0;
    this.isTwoHandZoom=false; this.twoHandStartDist=0;
    this.twoHandStartScale=1.0; this.leftPinching=false; this.rightPinching=false;
    this.currentScale=1.0;
    this.deadzone=0.18; this.rotateStep=0.04; this.zoomStep=0.025;
    this.minDistance=0.10; this.maxDistance=8.0; this.grabRadius=0.15;
    this.holdOffset=new THREE.Vector3(0,-0.02,-0.20);
    this.tA=new THREE.Vector3(); this.tB=new THREE.Vector3();
    this.tC=new THREE.Vector3(); this.tQ=new THREE.Quaternion();
    this.tDir=new THREE.Vector3();

    const ctrl = document.querySelector('#controller-right');
    ctrl.addEventListener('triggerdown', () => {
      const hits = ctrl.components.raycaster?.intersections || [];
      // Wenn Menu-Button getroffen → kein Grab
      if (hits.some(h => h.object?.el?.classList.contains('menu-btn'))) return;
      for (const h of hits) {
        if (h.object?.el?.classList.contains('grabbable')) {
          this.isGrabbed=true; this.activeSource='controller'; this._col('#FF8800'); break;
        }
      }
    });
    ctrl.addEventListener('triggerup',       () => this._endGrab());
    ctrl.addEventListener('thumbstickmoved', e => { this.stickX=e.detail.x||0; this.stickY=e.detail.y||0; });

    const hr = document.querySelector('#hand-right');
    hr.addEventListener('pinchstarted', () => { this.rightPinching=true;  this._checkGrab(); });
    hr.addEventListener('pinchended',   () => { this.rightPinching=false; this._endTwo('right'); });
    const hl = document.querySelector('#hand-left');
    hl.addEventListener('pinchstarted', () => { this.leftPinching=true;  this._checkGrab(); });
    hl.addEventListener('pinchended',   () => { this.leftPinching=false; this._endTwo('left'); });
  },
  _checkGrab: function() {
    if (this.leftPinching && this.rightPinching) {
      this.isGrabbed=false; this.isTwoHandZoom=true;
      this.twoHandStartDist=this._twoDist(); this.twoHandStartScale=this.currentScale;
      this._col('#AA00FF'); return;
    }
    if (this.rightPinching && this.handNearObject && !this.isTwoHandZoom) {
      this.isGrabbed=true; this.activeSource='hand'; this._col('#0088FF');
    }
  },
  _endTwo: function(side) {
    if (this.isTwoHandZoom) { this.isTwoHandZoom=false; this._col('#00AA00'); return; }
    if (side==='right') this._endGrab();
  },
  _twoDist: function() {
    const r=document.querySelector('#hand-right'), l=document.querySelector('#hand-left');
    if(!r||!l) return 0.3;
    r.object3D.getWorldPosition(this.tA); l.object3D.getWorldPosition(this.tB);
    return this.tA.distanceTo(this.tB);
  },
  _col: function(c) { this.grabBoxEl?.setAttribute('material',`color:${c};opacity:0.18;transparent:true`); },
  _endGrab: function() { this.isGrabbed=false; this.activeSource=null; this._col(this.handNearObject?'#00FF44':'#00AA00'); },
  tick: function() {
    if (!this.camObj) { const c=document.querySelector('a-camera'); if(!c?.object3D) return; this.camObj=c.object3D; }
    const hr=document.querySelector('#hand-right'); if(!hr) return;

    if (!this.isGrabbed && !this.isTwoHandZoom) {
      hr.object3D.getWorldPosition(this.tA); this.rig.getWorldPosition(this.tB);
      const near=this.tA.distanceTo(this.tB)<this.grabRadius;
      if(near!==this.handNearObject){this.handNearObject=near;this._col(near?'#00FF44':'#00AA00');}
    }
    if (this.isTwoHandZoom) {
      const d=this._twoDist();
      if(this.twoHandStartDist>0.001){
        this.currentScale=Math.max(0.02,Math.min(20.0,this.twoHandStartScale*(d/this.twoHandStartDist)));
        this.modelNode.scale.setScalar(this.currentScale);
      }
      return;
    }
    if (!this.isGrabbed) {
      if(Math.abs(this.stickX)>this.deadzone)
        this.modelNode.rotation.y+=this.stickX>0?this.rotateStep:-this.rotateStep;
      if(Math.abs(this.stickY)>this.deadzone){
        this.camObj.getWorldPosition(this.tA); this.rig.getWorldPosition(this.tB);
        this.tDir.subVectors(this.tB,this.tA);
        let d=this.tDir.length();
        if(d<0.001){this.camObj.getWorldDirection(this.tDir);d=0.5;}else this.tDir.normalize();
        d+=this.stickY>this.deadzone?-this.zoomStep:this.zoomStep;
        d=Math.max(this.minDistance,Math.min(this.maxDistance,d));
        this.rig.position.copy(this.tA).addScaledVector(this.tDir,d);
      }
    }
    if (this.isGrabbed) {
      if(this.activeSource==='controller'){
        const c=document.querySelector('#controller-right');
        c.object3D.getWorldPosition(this.tA); c.object3D.getWorldQuaternion(this.tQ);
        this.tC.copy(this.holdOffset).applyQuaternion(this.tQ);
        this.rig.position.copy(this.tA).add(this.tC); this.rig.quaternion.copy(this.tQ);
      } else if(this.activeSource==='hand'){
        hr.object3D.getWorldPosition(this.tA); hr.object3D.getWorldQuaternion(this.tQ);
        this.rig.position.copy(this.tA); this.rig.quaternion.copy(this.tQ);
      }
    }
  }
});
  </script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { overflow:hidden; background:#000; }
  </style>
</head>
<body>

<a-scene
  xr-mode-ui="XRMode: ar"
  webxr="requiredFeatures: local-floor; optionalFeatures: hand-tracking;"
  renderer="colorManagement:true; antialias:true; physicallyCorrectLights:true; exposure:1.2;">

  <a-assets>
    <a-asset-item id="meinModell" src="EntwurfARBrille.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 1.6 0"></a-camera>

  <a-light type="ambient"     color="#fff"    intensity="0.5"></a-light>
  <a-light type="directional" color="#fff"    intensity="1.4" position="-1 2 1" castShadow="true"></a-light>
  <a-light type="directional" color="#ffddbb" intensity="0.4" position="1 -1 -1"></a-light>

  <!-- MODELL -->
  <a-entity id="rig" position="0 1.2 -0.8">
    <a-box id="grab-box" class="grabbable"
      width="1" height="1" depth="1"
      material="color:#00AA00; opacity:0.18; transparent:true"
      wireframe="true">
    </a-box>
    <a-entity id="model-node">
      <a-entity id="modell-objekt" gltf-model="#meinModell" auto-center-scale></a-entity>
    </a-entity>
  </a-entity>

  <!-- ═══════════════════════════════════════════════════════════
       MENU — head-locked, unten rechts im Sichtfeld
       Aufbau: alles nur a-plane + a-text + menu-button Komponente
       Keine externen Abhängigkeiten, kein a-rounded.
  ═══════════════════════════════════════════════════════════════ -->

  <!-- Hamburger / Close Toggle — immer sichtbar -->
  <a-entity head-locked="dist:1.0; offsetX:0.44; offsetY:-0.14">
    <a-entity id="btn-hamburger" menu-button="action:toggleMenu">
      <a-plane class="btn-bg" width="0.055" height="0.055" color="#0d0d22"
               material="opacity:0.95; transparent:true; side:double">
      </a-plane>
      <a-text id="hamburger-text" value="X" align="center" color="#ffffff"
              width="0.13" position="0 0 0.003">
      </a-text>
    </a-entity>
  </a-entity>

  <!-- Haupt-Panel -->
  <a-entity id="main-panel" head-locked="dist:1.0; offsetX:0.30; offsetY:-0.27" visible="true">

    <!-- Hintergrund -->
    <a-plane width="0.30" height="0.20" color="#0d0d22"
             material="opacity:0.92; transparent:true; side:double"
             position="0 0 -0.001">
    </a-plane>

    <!-- Titel -->
    <a-text value="POPP AR" align="center" color="#44aaff"
            width="0.24" position="0 0.075 0">
    </a-text>

    <!-- Info: Modellgrösse -->
    <a-text id="info-text" value="lädt..." align="center" color="#aaaaaa"
            width="0.22" position="0 0.042 0">
    </a-text>

    <!-- Trennlinie -->
    <a-plane width="0.28" height="0.003" color="#334466" position="0 0.018 0"></a-plane>

    <!-- Button: Platzierung -->
    <a-entity id="btn-place" menu-button="action:togglePlacement" position="0 -0.018 0">
      <a-plane class="btn-bg" width="0.28" height="0.038" color="#1a1a3a"
               material="opacity:0.97; transparent:true; side:double">
      </a-plane>
      <a-text id="place-text" value="Boden 1:1" align="center" color="#ffffff"
              width="0.22" position="0 0 0.004">
      </a-text>
    </a-entity>

    <!-- Button: Clip AN/AUS -->
    <a-entity id="btn-clip" menu-button="action:toggleClip" position="0 -0.062 0">
      <a-plane class="btn-bg" width="0.28" height="0.038" color="#1a1a3a"
               material="opacity:0.97; transparent:true; side:double">
      </a-plane>
      <a-text id="clip-text" value="Clip AN" align="center" color="#ffffff"
              width="0.22" position="0 0 0.004">
      </a-text>
    </a-entity>

  </a-entity>

  <!-- Clip-Untermenü — erscheint unter Haupt-Panel wenn Clip aktiv -->
  <a-entity id="clip-sub" head-locked="dist:1.0; offsetX:0.30; offsetY:-0.47" visible="false">

    <a-plane width="0.30" height="0.20" color="#0d0d22"
             material="opacity:0.92; transparent:true; side:double"
             position="0 0 -0.001">
    </a-plane>

    <!-- Achse X -->
    <a-entity id="btn-axis-x" menu-button="action:axisX" position="-0.092 0.068 0">
      <a-plane class="btn-bg" width="0.088" height="0.038" color="#1a1a3a"
               material="opacity:0.97; transparent:true; side:double">
      </a-plane>
      <a-text value="X" align="center" color="#ff8844" width="0.12" position="0 0 0.004"></a-text>
    </a-entity>

    <!-- Achse Y -->
    <a-entity id="btn-axis-y" menu-button="action:axisY" position="0 0.068 0">
      <a-plane class="btn-bg" width="0.088" height="0.038" color="#1a1a3a"
               material="opacity:0.97; transparent:true; side:double">
      </a-plane>
      <a-text value="Y" align="center" color="#44ff88" width="0.12" position="0 0 0.004"></a-text>
    </a-entity>

    <!-- Achse Z -->
    <a-entity id="btn-axis-z" menu-button="action:axisZ" position="0.092 0.068 0">
      <a-plane class="btn-bg" width="0.088" height="0.038" color="#1a1a3a"
               material="opacity:0.97; transparent:true; side:double">
      </a-plane>
      <a-text value="Z" align="center" color="#4488ff" width="0.12" position="0 0 0.004"></a-text>
    </a-entity>

    <!-- Slider: Minus -->
    <a-entity menu-button="action:sliderMinus" position="-0.104 0.020 0">
      <a-plane class="btn-bg" width="0.064" height="0.038" color="#1a1a3a"
               material="opacity:0.97; transparent:true; side:double">
      </a-plane>
      <a-text value="&lt;" align="center" color="#ffffff" width="0.12" position="0 0 0.004"></a-text>
    </a-entity>

    <!-- Slider-Wert -->
    <a-text id="slider-val" value="0 mm" align="center" color="#00ccff"
            width="0.18" position="0 0.020 0">
    </a-text>

    <!-- Slider: Plus -->
    <a-entity menu-button="action:sliderPlus" position="0.104 0.020 0">
      <a-plane class="btn-bg" width="0.064" height="0.038" color="#1a1a3a"
               material="opacity:0.97; transparent:true; side:double">
      </a-plane>
      <a-text value="&gt;" align="center" color="#ffffff" width="0.12" position="0 0 0.004"></a-text>
    </a-entity>

    <!-- Flip -->
    <a-entity menu-button="action:flipClip" position="0 -0.030 0">
      <a-plane class="btn-bg" width="0.28" height="0.038" color="#1a1a3a"
               material="opacity:0.97; transparent:true; side:double">
      </a-plane>
      <a-text value="Flip Richtung" align="center" color="#ffffff"
              width="0.22" position="0 0 0.004">
      </a-text>
    </a-entity>

    <!-- Schnitt-Wert grösser ändern (x5) -->
    <a-entity menu-button="action:sliderMinus" position="-0.104 -0.076 0">
      <a-plane class="btn-bg" width="0.064" height="0.038" color="#1a1a3a"
               material="opacity:0.97; transparent:true; side:double">
      </a-plane>
      <a-text value="&lt;&lt;" align="center" color="#aaaaaa" width="0.10" position="0 0 0.004"></a-text>
    </a-entity>
    <a-text value="Grob" align="center" color="#666688" width="0.14" position="0 -0.076 0"></a-text>
    <a-entity menu-button="action:sliderPlus" position="0.104 -0.076 0">
      <a-plane class="btn-bg" width="0.064" height="0.038" color="#1a1a3a"
               material="opacity:0.97; transparent:true; side:double">
      </a-plane>
      <a-text value="&gt;&gt;" align="center" color="#aaaaaa" width="0.10" position="0 0 0.004"></a-text>
    </a-entity>

  </a-entity>
  <!-- /clip-sub -->

  <!-- CONTROLLER -->
  <a-entity id="controller-right"
            oculus-touch-controls="hand: right"
            raycaster="objects: .grabbable, .menu-btn; showLine:true; far:20; lineColor:yellow; lineOpacity:0.8"
            ar-steuerung>
  </a-entity>

  <a-entity id="hand-right" hand-tracking-controls="hand:right; modelStyle:dots"></a-entity>
  <a-entity id="hand-left"  hand-tracking-controls="hand:left;  modelStyle:dots"></a-entity>

</a-scene>

</body>
</html>
