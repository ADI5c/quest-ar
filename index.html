<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR Brille - Finale Steuerung</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script>
      AFRAME.registerComponent('ar-steuerung', {
        init: function () {
          const controller = this.el;
          const target = document.querySelector('#parent-container');
          const scene = document.querySelector('a-scene').object3D;
          const camera = document.querySelector('a-camera');
          let isGrabbed = false;

          const minDistance = 0.25;
          const maxDistance = 4.0;
          const moveStep = 0.05;

          const dir = new THREE.Vector3();
          const targetWorldPos = new THREE.Vector3();
          const cameraWorldPos = new THREE.Vector3();

          controller.addEventListener('triggerdown', () => {
            const hits = controller.components.raycaster.intersections;
            if (hits.length > 0) {
              isGrabbed = true;
              controller.object3D.attach(target.object3D);
            }
          });

          controller.addEventListener('triggerup', () => {
            if (isGrabbed) {
              isGrabbed = false;
              scene.attach(target.object3D);
            }
          });

          controller.addEventListener('thumbstickmoved', (evt) => {
            if (isGrabbed) return;

            // Rotation
            if (evt.detail.x > 0.2) target.object3D.rotation.y += 0.03;
            if (evt.detail.x < -0.2) target.object3D.rotation.y -= 0.03;

            // Distanz Kamera <-> Objekt
            camera.object3D.getWorldPosition(cameraWorldPos);
            target.object3D.getWorldPosition(targetWorldPos);

            dir.subVectors(targetWorldPos, cameraWorldPos);
            let distance = dir.length();
            if (distance === 0) return;

            dir.normalize();

            // Stick zu dir => näher
            if (evt.detail.y > 0.2) {
              distance = Math.max(minDistance, distance - moveStep);
              target.object3D.position.copy(camera.object3D.position).add(dir.multiplyScalar(distance));
            }

            // Stick von dir weg => weiter weg
            if (evt.detail.y < -0.2) {
              distance = Math.min(maxDistance, distance + moveStep);
              target.object3D.position.copy(camera.object3D.position).add(dir.multiplyScalar(distance));
            }
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene xr-mode-ui="XRMode: ar" renderer="colorManagement: true">
      <a-assets>
        <a-asset-item id="meinModell" src="EntwurfARBrille.glb"></a-asset-item>
      </a-assets>

      <a-entity id="parent-container" position="0 1.2 -1">
        <a-entity 
          id="modell-objekt"
          gltf-model="#meinModell" 
          class="clickable"
          scale="0.1 0.1 0.1">
        </a-entity>
      </a-entity>

      <a-entity id="hand"
                oculus-touch-controls="hand: right"
                raycaster="objects: .clickable; showLine: true; far: 100"
                line="color: yellow; opacity: 1"
                ar-steuerung>
      </a-entity>

      <a-light type="ambient" intensity="1.5"></a-light>
      <a-light type="directional" position="1 2 1" intensity="1"></a-light>
      <a-camera position="0 1.6 0"></a-camera>
    </a-scene>
  </body>
</html>
