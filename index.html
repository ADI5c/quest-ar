<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR Brille - Controller & Freie Hand</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script>
      // --- KOMPONENTE 1: DAS MODELL AUTOMATISCH ZENTRIEREN ---
      AFRAME.registerComponent('auto-center', {
        init: function () {
          this.el.addEventListener('model-loaded', (e) => {
            const model = e.detail.model;
            if (!model) return;
            const box = new THREE.Box3().setFromObject(model);
            if (box.isEmpty()) {
              console.warn("Das 3D-Modell ist leer oder hat keine Geometrie.");
              return;
            }
            const center = new THREE.Vector3();
            box.getCenter(center);
            model.position.x -= center.x;
            model.position.y -= center.y;
            model.position.z -= center.z;
            console.log("Modell wurde erfolgreich zentriert!");
          });
        }
      });

      // --- KOMPONENTE 2: DIE AR-STEUERUNG ---
      AFRAME.registerComponent('ar-steuerung', {
        init: function () {
          this.sceneEl     = document.querySelector('a-scene');
          this.rig         = document.querySelector('#rig').object3D;
          this.modelNode   = document.querySelector('#model-node').object3D;
          this.grabbableEl = document.querySelector('#grab-box');

          this.isGrabbed      = false;
          this.activeSource   = null;   // 'controller' | 'hand'
          this.handNearObject = false;
          this.stickX = 0;
          this.stickY = 0;

          this.deadzone    = 0.2;
          this.rotateStep  = 0.05;
          this.zoomStep    = 0.03;
          this.minDistance = 0.2;
          this.maxDistance = 4.0;

          // Wie nah muss die Hand sein, um greifen zu können (Meter)
          this.grabRadius = 0.15;

          // Offset für Controller-Greifen
          this.holdOffset = new THREE.Vector3(0, -0.02, -0.18);

          // Temp-Vektoren (kein Garbage in tick)
          this.tmpHandPos        = new THREE.Vector3();
          this.tmpRigPos         = new THREE.Vector3();
          this.tmpControllerPos  = new THREE.Vector3();
          this.tmpControllerQuat = new THREE.Quaternion();
          this.tmpOffset         = new THREE.Vector3();
          this.tmpCamPos         = new THREE.Vector3();
          this.tmpDir            = new THREE.Vector3();
          this.tmpForward        = new THREE.Vector3();

          // ── CONTROLLER (Oculus Touch) ──────────────────────────────────────
          const controllerEl = document.querySelector('#controller-right');

          controllerEl.addEventListener('triggerdown', () => {
            const raycaster = controllerEl.components.raycaster;
            const hits = raycaster ? raycaster.intersections : [];
            for (let i = 0; i < hits.length; i++) {
              if (hits[i].object?.el?.classList.contains('grabbable')) {
                this.isGrabbed    = true;
                this.activeSource = 'controller';
                this._setBoxColor('#FF8800'); // orange = Controller hält
                break;
              }
            }
          });

          controllerEl.addEventListener('triggerup', () => this._endGrab());

          controllerEl.addEventListener('thumbstickmoved', (evt) => {
            this.stickX = evt.detail.x || 0;
            this.stickY = evt.detail.y || 0;
          });

          // ── HAND-TRACKING ──────────────────────────────────────────────────
          // Pinch nur aktivieren wenn Hand nah genug am Objekt ist
          const handEl = document.querySelector('#hand-right');

          handEl.addEventListener('pinchstarted', () => {
            if (this.handNearObject) {
              this.isGrabbed    = true;
              this.activeSource = 'hand';
              this._setBoxColor('#0088FF'); // blau = Hand hält
            }
          });

          handEl.addEventListener('pinchended', () => this._endGrab());
        },

        _setBoxColor: function (color) {
          if (this.grabbableEl) {
            this.grabbableEl.setAttribute('material',
              `color: ${color}; opacity: 0.3; transparent: true`);
          }
        },

        _endGrab: function () {
          this.isGrabbed    = false;
          this.activeSource = null;
          this._setBoxColor(this.handNearObject ? '#00FF44' : '#00AA00');
        },

        tick: function () {
          // Kamera lazy holen
          if (!this.cameraObj) {
            const camEl = document.querySelector('a-camera');
            if (!camEl?.object3D) return;
            this.cameraObj = camEl.object3D;
          }

          const handEl = document.querySelector('#hand-right');
          if (!handEl) return;

          // ── HAND-NÄHE PRÜFEN ──────────────────────────────────────────────
          if (!this.isGrabbed) {
            handEl.object3D.getWorldPosition(this.tmpHandPos);
            this.rig.getWorldPosition(this.tmpRigPos);

            const dist    = this.tmpHandPos.distanceTo(this.tmpRigPos);
            const wasNear = this.handNearObject;
            this.handNearObject = dist < this.grabRadius;

            if (this.handNearObject !== wasNear) {
              this._setBoxColor(this.handNearObject ? '#00FF44' : '#00AA00');
            }
          }

          // ── JOYSTICK: Rotation & Zoom ──────────────────────────────────────
          if (!this.isGrabbed) {
            if (Math.abs(this.stickX) > this.deadzone) {
              this.modelNode.rotation.y +=
                (this.stickX > 0 ? this.rotateStep : -this.rotateStep);
            }

            if (Math.abs(this.stickY) > this.deadzone) {
              this.cameraObj.getWorldPosition(this.tmpCamPos);
              this.rig.getWorldPosition(this.tmpRigPos);
              this.tmpDir.subVectors(this.tmpRigPos, this.tmpCamPos);
              let d = this.tmpDir.length();
              if (d < 0.0001) {
                this.cameraObj.getWorldDirection(this.tmpForward);
                this.tmpDir.copy(this.tmpForward);
                d = 0.5;
              } else {
                this.tmpDir.normalize();
              }
              d += (this.stickY > this.deadzone ? -this.zoomStep : this.zoomStep);
              d = Math.max(this.minDistance, Math.min(this.maxDistance, d));
              this.tmpRigPos.copy(this.tmpCamPos).add(this.tmpDir.multiplyScalar(d));
              this.rig.position.copy(this.tmpRigPos);
            }
          }

          // ── OBJEKT BEWEGEN ─────────────────────────────────────────────────
          if (this.isGrabbed) {
            if (this.activeSource === 'controller') {
              const controllerEl = document.querySelector('#controller-right');
              controllerEl.object3D.getWorldPosition(this.tmpControllerPos);
              controllerEl.object3D.getWorldQuaternion(this.tmpControllerQuat);
              this.tmpOffset.copy(this.holdOffset).applyQuaternion(this.tmpControllerQuat);
              this.rig.position.copy(this.tmpControllerPos).add(this.tmpOffset);
              this.rig.quaternion.copy(this.tmpControllerQuat);

            } else if (this.activeSource === 'hand') {
              handEl.object3D.getWorldPosition(this.tmpHandPos);
              handEl.object3D.getWorldQuaternion(this.tmpControllerQuat);
              this.rig.position.copy(this.tmpHandPos);
              this.rig.quaternion.copy(this.tmpControllerQuat);
            }
          }
        }
      });
    </script>
  </head>

  <body>
    <a-scene
      xr-mode-ui="XRMode: ar"
      webxr="optionalFeatures: hand-tracking;"
      renderer="colorManagement: true; antialias: true; physicallyCorrectLights: true; exposure: 1.2;">

      <a-assets>
        <a-asset-item id="meinModell" src="EntwurfARBrille.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 1.6 0"></a-camera>

      <a-light type="ambient"     color="#FFF"    intensity="0.6"></a-light>
      <a-light type="directional" color="#FFF"    intensity="1.5" position="-1 2 1"  castShadow="true"></a-light>
      <a-light type="directional" color="#FFDDBB" intensity="0.5" position="1 -1 -1"></a-light>

      <a-entity id="rig" position="0 1.2 -0.6">

        <!--
          Grab-Box: visuelles Feedback + Raycaster-Ziel für Controller
          Farben:
            dunkelgrün  = weit weg
            hellgrün    = Hand in Reichweite → jetzt pinchen!
            orange      = Controller hält
            blau        = Hand hält
        -->
        <a-box
          id="grab-box"
          class="grabbable"
          position="0 0 0"
          depth="0.5" height="0.5" width="0.5"
          material="color: #00AA00; opacity: 0.2; transparent: true">
        </a-box>

        <a-entity id="model-node">
          <a-entity
            id="modell-objekt"
            gltf-model="#meinModell"
            scale="1 1 1"
            position="-0.5 0 0.2"
            auto-center>
          </a-entity>
        </a-entity>
      </a-entity>

      <!-- Oculus Touch Controller (rechts) — Trigger zum Greifen -->
      <a-entity id="controller-right"
                oculus-touch-controls="hand: right"
                raycaster="objects: .grabbable; showLine: true; far: 100"
                line="color: yellow; opacity: 1"
                ar-steuerung>
      </a-entity>

      <!--
        Freie Hand (rechts) — NUR hand-tracking-controls, KEIN Raycaster
        Anleitung:
          1. Hand in den grünen Würfel bewegen → wird hellgrün
          2. Daumen + Zeigefinger zusammendrücken (Pinch) → wird blau
          3. Hand bewegen → Objekt folgt
          4. Finger öffnen → loslassen
      -->
      <a-entity id="hand-right"
                hand-tracking-controls="hand: right; modelStyle: dots">
      </a-entity>

    </a-scene>
  </body>
</html>
