<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR Brille - Finale Steuerung</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script>
      AFRAME.registerComponent('ar-steuerung', {
        init: function () {
          const controller = this.el;
          const scene = document.querySelector('a-scene').object3D;

          // Hierarchie
          const rig = document.querySelector('#rig');
          const distanceNode = document.querySelector('#distance-node');
          const modelNode = document.querySelector('#model-node');

          let isGrabbed = false;

          const deadzone = 0.2;
          const rotateStep = 0.04;
          const zoomStep = 0.05;

          // Achtung:
          // distance-node startet bei z = -1
          // näher = Richtung 0
          // weiter weg = stärker negativ
          const minZ = -1.8;   // weiter weg
          const maxZ = -0.08;  // sehr nah

          // GREIFEN
          controller.addEventListener('triggerdown', () => {
            const raycaster = controller.components.raycaster;
            const hits = raycaster ? raycaster.intersections : [];

            if (hits.length > 0) {
              isGrabbed = true;
              controller.object3D.attach(rig.object3D);
            }
          });

          // LOSLASSEN
          controller.addEventListener('triggerup', () => {
            if (isGrabbed) {
              isGrabbed = false;
              scene.attach(rig.object3D);
            }
          });

          // JOYSTICK
          controller.addEventListener('thumbstickmoved', (evt) => {
            const x = evt.detail.x || 0;
            const y = evt.detail.y || 0;

            // DREHEN = nur Modell drehen
            if (x > deadzone) {
              modelNode.object3D.rotation.y += rotateStep;
            }
            if (x < -deadzone) {
              modelNode.object3D.rotation.y -= rotateStep;
            }

            // ZOOM = nur Distanzknoten verschieben
            // Stick zu dir ziehen => näher => z Richtung 0
            if (y > deadzone) {
              distanceNode.object3D.position.z = Math.min(
                maxZ,
                distanceNode.object3D.position.z + zoomStep
              );
            }

            // Stick nach vorne drücken => weiter weg => negativer
            if (y < -deadzone) {
              distanceNode.object3D.position.z = Math.max(
                minZ,
                distanceNode.object3D.position.z - zoomStep
              );
            }
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene xr-mode-ui="XRMode: ar" renderer="colorManagement: true">

      <a-assets>
        <a-asset-item id="meinModell" src="EntwurfARBrille.glb"></a-asset-item>
      </a-assets>

      <!-- Globale Position im Raum -->
      <a-entity id="rig" position="0 1.2 0">

        <!-- Nur Distanz zur Kamera -->
        <a-entity id="distance-node" position="0 0 -1">

          <!-- Nur Rotation / Modell -->
          <a-entity id="model-node" class="clickable">
            <a-entity
              id="modell-objekt"
              gltf-model="#meinModell"
              scale="0.1 0.1 0.1">
            </a-entity>
          </a-entity>

        </a-entity>
      </a-entity>

      <a-entity id="hand"
                oculus-touch-controls="hand: right"
                raycaster="objects: .clickable; showLine: true; far: 100"
                line="color: yellow; opacity: 1"
                ar-steuerung>
      </a-entity>

      <a-light type="ambient" intensity="1.5"></a-light>
      <a-light type="directional" position="1 2 1" intensity="1"></a-light>
      <a-camera position="0 1.6 0"></a-camera>

    </a-scene>
  </body>
</html>
