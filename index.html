<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR Brille - stabile Steuerung</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script>
      AFRAME.registerComponent('ar-steuerung', {
        init: function () {
          this.controller = this.el;
          this.sceneEl = document.querySelector('a-scene');
          this.sceneObj = this.sceneEl.object3D;

          this.rig = document.querySelector('#rig').object3D;
          this.modelNode = document.querySelector('#model-node').object3D;
          this.cameraObj = document.querySelector('a-camera').object3D;

          this.isGrabbed = false;

          this.deadzone = 0.2;
          this.rotateStep = 0.04;
          this.zoomStep = 0.06;

          this.minDistance = 0.12;
          this.maxDistance = 3.0;

          // Objekt in der Hand leicht vor dem Controller
          this.holdOffset = new THREE.Vector3(0, -0.02, -0.18);

          this.tmpControllerPos = new THREE.Vector3();
          this.tmpControllerQuat = new THREE.Quaternion();
          this.tmpOffset = new THREE.Vector3();

          this.tmpCamPos = new THREE.Vector3();
          this.tmpRigPos = new THREE.Vector3();
          this.tmpDir = new THREE.Vector3();
          this.tmpForward = new THREE.Vector3();

          this.controller.addEventListener('triggerdown', () => {
            const raycaster = this.controller.components.raycaster;
            const hits = raycaster ? raycaster.intersections : [];

            if (!hits || hits.length === 0) return;

            for (let i = 0; i < hits.length; i++) {
              const hit = hits[i];
              if (hit.object && hit.object.el && hit.object.el.classList.contains('grabbable')) {
                this.isGrabbed = true;
                break;
              }
            }
          });

          this.controller.addEventListener('triggerup', () => {
            this.isGrabbed = false;
          });

          this.controller.addEventListener('thumbstickmoved', (evt) => {
            const x = evt.detail.x || 0;
            const y = evt.detail.y || 0;

            // Drehen
            if (x > this.deadzone) this.modelNode.rotation.y += this.rotateStep;
            if (x < -this.deadzone) this.modelNode.rotation.y -= this.rotateStep;

            // Zoom nur wenn NICHT gegriffen
            if (this.isGrabbed) return;
            if (Math.abs(y) < this.deadzone) return;

            this.cameraObj.getWorldPosition(this.tmpCamPos);
            this.rig.getWorldPosition(this.tmpRigPos);

            this.tmpDir.subVectors(this.tmpRigPos, this.tmpCamPos);
            let dist = this.tmpDir.length();

            if (dist < 0.0001) {
              this.cameraObj.getWorldDirection(this.tmpForward);
              this.tmpDir.copy(this.tmpForward);
              dist = 0.5;
            } else {
              this.tmpDir.normalize();
            }

            // Stick zu dir ziehen => näher
            if (y > this.deadzone) {
              dist = Math.max(this.minDistance, dist - this.zoomStep);
            }

            // Stick nach vorne drücken => weiter weg
            if (y < -this.deadzone) {
              dist = Math.min(this.maxDistance, dist + this.zoomStep);
            }

            this.tmpRigPos.copy(this.tmpCamPos).add(this.tmpDir.multiplyScalar(dist));
            this.rig.position.copy(this.tmpRigPos);
          });
        },

        tick: function () {
          if (!this.isGrabbed) return;

          // Controller Weltposition + Orientierung holen
          this.controller.object3D.getWorldPosition(this.tmpControllerPos);
          this.controller.object3D.getWorldQuaternion(this.tmpControllerQuat);

          // Offset relativ zur Controller-Ausrichtung
          this.tmpOffset.copy(this.holdOffset).applyQuaternion(this.tmpControllerQuat);

          // Rig direkt vor die Hand setzen
          this.rig.position.copy(this.tmpControllerPos).add(this.tmpOffset);

          // Optional: Grundausrichtung der Hand übernehmen
          this.rig.quaternion.copy(this.tmpControllerQuat);
        }
      });
    </script>
  </head>

  <body>
    <a-scene xr-mode-ui="XRMode: ar" renderer="colorManagement: true">

      <a-assets>
        <a-asset-item id="meinModell" src="EntwurfARBrille.glb"></a-asset-item>
      </a-assets>

      <!-- Gesamtes Objekt -->
      <a-entity id="rig" position="0 1.25 -0.6">

        <!-- unsichtbarer Greif-Körper -->
        <a-box
          class="grabbable"
          position="0 0 0"
          depth="0.30"
          height="0.16"
          width="0.22"
          material="opacity: 0; transparent: true">
        </a-box>

        <!-- nur Modellrotation -->
        <a-entity id="model-node">
          <a-entity
            id="modell-objekt"
            gltf-model="#meinModell"
            scale="0.1 0.1 0.1">
          </a-entity>
        </a-entity>

      </a-entity>

      <a-entity id="hand"
                oculus-touch-controls="hand: right"
                raycaster="objects: .grabbable; showLine: true; far: 100"
                line="color: yellow; opacity: 1"
                ar-steuerung>
      </a-entity>

      <a-light type="ambient" intensity="1.5"></a-light>
      <a-light type="directional" position="1 2 1" intensity="1"></a-light>
      <a-camera position="0 1.6 0"></a-camera>

    </a-scene>
  </body>
</html>
