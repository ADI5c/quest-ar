<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene xr-mode-ui="XRMode: ar" raycaster="objects: .clickable">
      
      <a-assets>
        <a-asset-item id="meinModell" src="EntwurfARBrille.glb"></a-asset-item>
      </a-assets>

      <a-entity id="parent-container" position="0 1.2 -1">
          <a-entity 
            id="modell-objekt"
            gltf-model="#meinModell" 
            class="clickable"
            scale="1 1 1">
          </a-entity>
      </a-entity>

      <a-entity id="hand" oculus-touch-controls="hand: right" 
                raycaster="objects: .clickable; showLine: true; far: 100"
                line="color: yellow; opacity: 1">
      </a-entity>

      <a-light type="ambient" intensity="2"></a-light>
      <a-light type="directional" position="1 2 1"></a-light>
      <a-camera position="0 1.6 0"></a-camera>

    </a-scene>

    <script>
      const model = document.querySelector('#modell-objekt');
      const container = document.querySelector('#parent-container');
      const hand = document.querySelector('#hand');

      // MAGIC FIX: Sobald das Modell geladen ist, zentrieren wir es
      model.addEventListener('model-loaded', () => {
        const mesh = model.getObject3D('mesh');
        const box = new THREE.Box3().setFromObject(mesh);
        const center = new THREE.Vector3();
        box.getCenter(center);
        
        // Wir schieben das Modell intern so weit zurück, dass die Mitte bei 0,0,0 ist
        model.object3D.position.set(-center.x, -center.y, -center.z);
        
        // Automatische Größenanpassung: Wenn das Modell riesig ist, wird es geschrumpft
        const size = box.getSize(new THREE.Vector3()).length();
        const scaleFactor = 0.5 / size; // Wir machen es ca. 50cm groß
        model.setAttribute('scale', `${scaleFactor} ${scaleFactor} ${scaleFactor}`);
        
        console.log("Modell zentriert und skaliert!");
      });

      // Interaktion: Klick mit dem Trigger verschiebt das Modell zu dir
      hand.addEventListener('triggerdown', () => {
        const intersections = hand.components.raycaster.intersections;
        if (intersections.length > 0) {
            // Wenn du es triffst, springt es direkt zu deinem Controller
            container.setAttribute('position', '0 0 -0.5');
            hand.appendChild(container);
            console.log("Gegriffen!");
        } else {
            // Falls der Strahl nichts trifft: Modell vor die Kamera resetten
            container.setAttribute('position', '0 1.2 -1');
            document.querySelector('a-scene').appendChild(container);
        }
      });
    </script>
  </body>
</html>
