<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR Brille - Fixes Modell</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene xr-mode-ui="XRMode: ar" renderer="colorManagement: true">
      
      <a-assets>
        <a-asset-item id="meinModell" src="EntwurfARBrille.glb"></a-asset-item>
      </a-assets>

      <a-entity id="parent-container" position="0 1.2 -1">
          
          <a-entity 
            id="modell-objekt"
            gltf-model="#meinModell" 
            class="clickable"
            scale="1 1 1">
          </a-entity>
          
      </a-entity>

      <a-entity id="hand" oculus-touch-controls="hand: right" 
                raycaster="objects: .clickable; showLine: true; far: 100"
                line="color: yellow; opacity: 1">
      </a-entity>

      <a-light type="ambient" intensity="1.5"></a-light>
      <a-light type="directional" position="1 2 1" intensity="1"></a-light>
      
      <a-camera position="0 1.6 0"></a-camera>

    </a-scene>

    <script>
      const model = document.querySelector('#modell-objekt');
      const container = document.querySelector('#parent-container');
      const hand = document.querySelector('#hand');

      // 1. MODELL ZENTRIEREN (Aber Größe in Ruhe lassen!)
      model.addEventListener('model-loaded', () => {
        const mesh = model.getObject3D('mesh');
        const box = new THREE.Box3().setFromObject(mesh);
        const center = new THREE.Vector3();
        box.getCenter(center);
        
        // Schiebt das Modell intern genau in die Mitte des Containers
        model.object3D.position.set(-center.x, -center.y, -center.z);
        console.log("Modell wurde zentriert!");
      });

      // 2. MODELL GREIFEN UND VERSCHIEBEN
      hand.addEventListener('triggerdown', () => {
        // Prüfen, ob der gelbe Strahl das Modell trifft
        const intersections = hand.components.raycaster.intersections;
        
        if (intersections.length > 0) {
            // TREFFER: Modell springt an den Controller
            container.setAttribute('position', '0 0 -0.5'); 
            hand.appendChild(container);
            console.log("Modell gegriffen!");
        } else {
            // DANEBEN GEKLICKT: Modell springt zurück vor dich in den Raum
            container.setAttribute('position', '0 1.2 -1'); 
            document.querySelector('a-scene').appendChild(container);
            console.log("Modell zurückgesetzt.");
        }
      });
    </script>
  </body>
</html>
